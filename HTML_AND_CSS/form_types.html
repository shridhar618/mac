<!DOCTYPE html>
<html>
<head>
<title>All Input Types Example</title>
</head>
<body>

<h2>HTML Input Types Example</h2>

<form action="welcome.html">

<!-- Text -->
<label>Text:</label>
<input type="text" placeholder="Enter text"><br><br>

<!-- Password -->
<label>Password:</label>
<input type="password" placeholder="Enter password"><br><br>

<!-- Email -->
<label>Email:</label>
<input type="email" placeholder="Enter email"><br><br>

<!-- Number -->
<label>Number:</label>
<input type="number"><br><br>

<!-- Telephone -->
<label>Telephone:</label>
<input type="tel" placeholder="Enter phone number"><br><br>

<!-- URL -->
<label>URL:</label>
<input type="url" placeholder="Enter website URL"><br><br>

<!-- Search -->
<label>Search:</label>
<input type="search" placeholder="Search here"><br><br>

<!-- Date -->
<label>Date:</label>
<input type="date"><br><br>

<!-- Datetime Local -->
<label>Date & Time:</label>
<input type="datetime-local"><br><br>

<!-- Month -->
<label>Month:</label>
<input type="month"><br><br>

<!-- Week -->
<label>Week:</label>
<input type="week"><br><br>

<!-- Time -->
<label>Time:</label>
<input type="time"><br><br>

<!-- Radio -->
<label>Gender:</label>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female<br><br>

<!-- Checkbox -->
<label>Skills:</label>
<input type="checkbox"> Python
<input type="checkbox"> Java
<input type="checkbox"> Web Development<br><br>

<!-- File -->
<label>Upload File:</label>
<input type="file"><br><br>

<!-- Color -->
<label>Select Color:</label>
<input type="color"><br><br>

<!-- Range -->
<label>Range:</label>
<input type="range" min="0" max="100"><br><br>

<!-- Hidden -->
<input type="hidden" value="HiddenValue">

<!-- Image -->
<label>Image Button:</label><br>
<input type="image" src="https://via.placeholder.com/100" alt="Submit"><br><br>

<!-- Buttons -->
<input type="button" value="Click Button"><br><br>

<input type="submit" value="Submit Form">
<input type="reset" value="Reset Form">

</form>

</body>
</html>
