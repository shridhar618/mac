<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var student=new Array();
        student[0]= new Array();
        student[0][0]="PES1PG25";
        student[0][1]="Kavya";
        student[1]= new Array();
        student[1][0]="PES1PG26";
        student[1][1]="Sowmya";

        document.write(student[0][0]+" "+student[0][1]+"<br>");
        document.write(student[1][0]+" "+student[1][1]+"<br>");

        var list=["Apple", "Banana", "Cherry"];
        list.unshift("Mango");
        document.write("list after unshift:"+list + "<br>");

        list.push(40);
        document.write("list after push:"+list + "<br>");

        list.pop();
        document.write("After pop()"+list + "<br>");

        list.shift();
        document.write("After shift()"+list + "<br>");

        list.sort();
        document.write("After sort()"+list + "<br>");

        list.reverse();
        document.write("After reverse()"+list + "<br>");


    </script>
</body>
</html>
