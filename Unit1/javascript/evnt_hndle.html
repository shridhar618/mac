<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="fname" onblur="myFunction()">
    <button onclick="goNext()">Next</button>

    <input type="text" id="fname" onclick="changecolor('red')">
     <input type="text" id="fname" onmouseover="changecolor('blue')">
      <input type="text" id="fname" onmouseout="changecolor('white')">



    <script>
        function goNext() {
            window.location.href="func.html";
        }

        function myFunction() {
            var x=document.getElementById("fname");
            x.value=x.value.toUpperCase();
        }

        function changecolor(code) {
            document.bgColor=code;
        }

        function loadBody() {
            alert("Page is loaded");
        }
    </script>
</body>
</html>
