<!DOCTYPE html>

<html>
<head>
  <title>Laptop Selection</title>
  <script type="text/javascript" src="laptop_click.js"></script>
</head>

<body>
  <h4>Select a Laptop Type</h4>

  <form id="myForm" action="">
    <p>
      <label>
        <input type="radio" name="laptop" value="1"
               onclick="laptopChoice(1)" />
        Gaming Laptop
      </label>
      <br>

      <label>
        <input type="radio" name="laptop" value="2"
               onclick="laptopChoice(2)" />
        Business Laptop
      </label>
      <br>

      <label>
        <input type="radio" name="laptop" value="3"
               onclick="laptopChoice(3)" />
        Student Laptop
      </label>
      <br>

      <label>
        <input type="radio" name="laptop" value="4"
               onclick="laptopChoice(4)" />
        Ultrabook
      </label>
    </p>
  </form>

</body>
</html>
