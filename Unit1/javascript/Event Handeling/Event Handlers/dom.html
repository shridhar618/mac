<!DOCTYPE html>
<html>
<head><title>DOM</title></head>
<body>
<div>
<span style="background-color:#ffff00;font-size:0.4in;"
 onmouseover="this.style.backgroundColor='skyblue';this.style.color='green'"
 onmouseout="this.style.backgroundColor='orange';this.style.color='yellow'">
Sample element with mouse event handlers.
</span>
<br><hr>


<span style="background-color:yellow;font-size:0.3in;"
 onclick="alert(this.onclick)">Sample element with an onclick event
handler.</span>
</div>

</body>
</html>
