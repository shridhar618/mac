<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>mouse.html</title>
</head>

<body>
	
	<h2>Example 2: Mouseover Picture Change</h2>
<p>When you move your mouse over this picture, JavaScript will swap in a second picture immediately upon the Mouseover event.&nbsp; Immediately upon Mouseout, the first picture will be immediately swapped.</p>
<img alt="image" border="4" src="40.jpg" width="300" height="250" 
onmouseover="this.src='poster.jpg'" 
onmouseout="this.src='40.jpg'"/>

</body>
</html>
