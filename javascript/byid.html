<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p id="demo">Hello</p>

    <script>
        document.getElementById("demo").innerHTML="Welcome to JavaScript";
    </script>
</body>
</html>


<!-- byname -->
<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p name="demo">Hello</p>
    <script>
        document.getElementsByName("demo")[0].innerHTML="Welcome to JavaScript";
    </script>
</body>
</html>


<!-- by class -->
 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <div class="demo"><p>this is a paragraph 1</p></div>

    <div class="demo"><p>this is a paragraph 2</p></div>
    
    <script>
        const collection=document.getElementsByClassName("demo");
        collection[1].style.backgroundColor="red";
    </script>
 </body>
 </html>
