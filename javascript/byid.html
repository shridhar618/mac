<!-- byname -->
<!DOCTYPE html>
<html lang="en">    
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <p name="demo">Hello</p>
    <script>
        document.getElementsByName("demo")[0].innerHTML="Welcome to JavaScript";
    </script>
</body>
</html>
