<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        var myDate = new Date('21-06-2024');
        myDate.setDate(21);
        myDate.setMonth(5); 
        myDate.setFullYear(2024);
        myDate.setHours(19);
        myDate.setMinutes(30);
        document.write("Date: " + myDate.getDate() + "<br>");
        document.write("Month: " + (myDate.getMonth() + 1) + "<br>"); 
        document.write("Year: " + myDate.getFullYear() + "<br>");
        document.write("Hours: " + myDate.getHours() + "<br>");
        document.write("Minutes: " + myDate.getMinutes() + "<br>");
        document.write("Seconds: " + myDate.getSeconds() + "<br>");


        //confirm() and prompt()
        var userResponce=confirm("Do you want to continue this download?");

        if(userResponce){
            alert("User wants to continue the download.");
        }else{
            alert("You have cancelled the download.");
        }



        var name=prompt("Please enter your name:");
        alert("Hello, " + name + "! Welcome to JavaScript.");


        //do while loop
        let i=1;
        do{
            document.write(i + "<br>");
            i++;
        }while(i <= 10);


        let fruits=["Apple","Banana","Cherry"];

        console.log(fruits[0]); // Apple
        console.log(fruits[1]); // Banana
        console.log(fruits[2]); // Cherry
        


    </script>
</body>
</html>
